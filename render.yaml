services:
  - type: web
    name: dinodeutsch-agent-backend
    runtime: python
    rootDir: website/agent_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AGENT_MODEL_TYPE
        value: openai_chat
      - key: AGENT_MODEL_NAME
        value: gpt-4o-mini
      - key: AGENT_CONFIG_NAME
        value: website_assistant
      - key: AGENT_TEMPERATURE
        value: "0.35"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_BACKEND_TOKEN
        sync: false
