<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DinoDeutsch Listening A1-B2</title>
<style>
:root{
  --bg:#fff;--bg2:#f6f5f4;--bg3:#efefed;
  --tx:rgba(0,0,0,.95);--tx2:#615d59;--tx3:#a39e98;
  --border:rgba(0,0,0,.1);
  --blue:#0075de;--blue-hover:#005bab;--blue-bg:#f2f9ff;--blue-text:#097fe8;
  --green:#1aae39;--orange:#dd5b00;--teal:#2a9d99;--purple:#391c57;
  --shadow:rgba(0,0,0,.04) 0 4px 18px,rgba(0,0,0,.027) 0 2px 8px,rgba(0,0,0,.02) 0 1px 3px;
  --shadow-deep:rgba(0,0,0,.01) 0 1px 3px,rgba(0,0,0,.02) 0 3px 7px,rgba(0,0,0,.04) 0 14px 28px,rgba(0,0,0,.05) 0 23px 52px;
  --font:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#1a1916;--bg2:#222120;--bg3:#2e2d2b;
  --tx:rgba(255,255,255,.92);--tx2:#aaa5a0;--tx3:#77716c;
  --border:rgba(255,255,255,.1);
  --blue:#4ea8f7;--blue-hover:#3d9af0;--blue-bg:rgba(0,117,222,.16);--blue-text:#62aef0;
  --shadow:rgba(0,0,0,.28) 0 4px 18px;--shadow-deep:rgba(0,0,0,.5) 0 23px 52px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:var(--font);font-size:16px;-webkit-font-smoothing:antialiased}
button,textarea,input{font:inherit}
button:focus-visible,textarea:focus-visible,input:focus-visible{outline:2px solid var(--blue-text);outline-offset:2px}
.hero{background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);border-bottom:1px solid var(--border);padding:44px 24px 32px;text-align:center}
.hero h1{margin:0 0 10px;font-size:clamp(34px,5vw,54px);font-weight:700;line-height:1.04;letter-spacing:-1.875px}
.hero p{max-width:680px;margin:0 auto 18px;color:var(--tx2);font-size:18px;line-height:1.5}
.pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.pill{border:1px solid rgba(9,127,232,.16);border-radius:9999px;background:var(--blue-bg);color:var(--blue-text);padding:4px 10px;font-size:12px;font-weight:600;letter-spacing:.125px}
.app{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:calc(100vh - 176px)}
.side{border-right:1px solid var(--border);background:var(--bg);padding:18px;overflow:auto}
.main{background:var(--bg2);padding:22px;overflow:auto}
.label{margin:0 0 10px;color:var(--tx3);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.levels{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.level-btn{border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--tx2);padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}
.level-btn.on,.level-btn:hover{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-text)}
.lesson-list{display:flex;flex-direction:column;gap:8px}
.group-title{margin:16px 0 8px;color:var(--tx3);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.lesson-card{width:100%;text-align:left;border:1px solid var(--border);border-radius:12px;background:var(--bg);box-shadow:var(--shadow);padding:13px;cursor:pointer}
.lesson-card:hover{border-color:rgba(0,117,222,.28);transform:translateY(-1px)}
.lesson-card.on{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,117,222,.10),var(--shadow)}
.lesson-title{font-size:14px;font-weight:700;letter-spacing:-.15px;margin-bottom:4px}
.lesson-meta{display:flex;gap:6px;flex-wrap:wrap;color:var(--tx3);font-size:11px;font-weight:600}
.panel{max-width:960px;margin:0 auto;border:1px solid var(--border);border-radius:16px;background:var(--bg);box-shadow:var(--shadow-deep);overflow:hidden}
.panel-head{padding:22px 22px 18px;border-bottom:1px solid var(--border)}
.panel-title{margin:0 0 7px;font-size:30px;font-weight:700;line-height:1.12;letter-spacing:-.7px}
.panel-sub{margin:0;color:var(--tx2);font-size:15px;line-height:1.55}
.meta-row{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0 0}
.tag{border:1px solid var(--border);border-radius:9999px;background:var(--bg2);color:var(--tx2);padding:3px 9px;font-size:11px;font-weight:600}
.player{padding:18px 22px;border-bottom:1px solid var(--border);background:var(--bg)}
.bar{height:6px;border-radius:9999px;background:var(--bg3);overflow:hidden;margin-bottom:14px}
.fill{height:100%;width:0;background:var(--blue);border-radius:9999px;transition:width .2s}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{min-height:36px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--tx);padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--blue);border-color:transparent;color:#fff}
.btn.primary:hover{background:var(--blue-hover)}
.rate{display:flex;align-items:center;gap:7px;margin-left:auto;color:var(--tx3);font-size:12px;font-weight:600}
.rate input{accent-color:var(--blue)}
.content{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);gap:18px;padding:22px}
.card{border:1px solid var(--border);border-radius:12px;background:var(--bg);box-shadow:var(--shadow);padding:16px}
.card h2{margin:0 0 12px;font-size:16px;font-weight:700;letter-spacing:-.2px}
.listen-tags{display:flex;gap:6px;flex-wrap:wrap}
.listen-tag{border:1px solid rgba(221,91,0,.22);border-radius:9999px;background:rgba(221,91,0,.07);color:var(--orange);padding:3px 9px;font-size:12px;font-weight:600}
.transcript{display:flex;flex-direction:column;gap:8px}
.line{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--border);border-radius:8px;background:var(--bg2);padding:9px 10px;color:var(--tx2);line-height:1.55}
.line button{flex:0 0 auto;width:28px;height:28px;border:1px solid var(--border);border-radius:9999px;background:var(--bg);cursor:pointer;color:var(--blue)}
.transcript.hidden .line span{filter:blur(5px);user-select:none}
.checklist{display:flex;flex-direction:column;gap:8px}
.check{display:flex;gap:8px;align-items:flex-start;color:var(--tx2);font-size:13px;line-height:1.45}
.check input{margin-top:3px;accent-color:var(--blue)}
textarea{width:100%;min-height:112px;resize:vertical;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--tx);padding:10px 12px;line-height:1.5}
.score{margin-top:10px;color:var(--tx2);font-size:13px;line-height:1.5}
.empty{max-width:620px;margin:80px auto;text-align:center;color:var(--tx2)}
@media(max-width:860px){.app{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--border)}.main{padding:16px}.content{grid-template-columns:1fr}.rate{margin-left:0}.panel-title{font-size:24px}}
</style>
</head>
<body>
<header class="hero">
  <h1>Listening A1-B2</h1>
  <p>Nghe theo tình huống, bắt từ khóa trước, rồi dùng transcript, dictation và shadowing để biến nghe thụ động thành phản xạ.</p>
  <div class="pills"><span class="pill">Transcript ẩn/hiện</span><span class="pill">German TTS</span><span class="pill">Dictation score</span><span class="pill">Shadowing checklist</span></div>
</header>
<div class="app">
  <aside class="side">
    <p class="label">Level</p>
    <div id="levels" class="levels"></div>
    <p id="levelFocus" class="label"></p>
    <div id="lessons" class="lesson-list"></div>
  </aside>
  <main class="main">
    <div id="panel" class="panel"></div>
  </main>
</div>
<script>
let data;
let activeLevel = "A1";
let activeLesson;
let progressTimer;
let progress = 0;
let transcriptHidden = true;

const $ = (id) => document.getElementById(id);
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[c]));
const normalize = (text) => String(text || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\p{L}\p{N}\s]/gu," ").replace(/\s+/g," ").trim();

fetch("../data/listening.json")
  .then((res) => res.json())
  .then((json) => {
    data = json;
    activeLevel = json.levels[0].level;
    renderLevels();
    renderLessons();
    openLesson(firstLesson(json.levels[0]));
  })
  .catch(() => {
    $("panel").innerHTML = '<div class="empty">Không tải được data/listening.json.</div>';
  });

function firstLesson(levelData){
  return levelData.tracks[0].lessons[0];
}

function currentLevelData(){
  return data.levels.find((level) => level.level === activeLevel);
}

function renderLevels(){
  $("levels").innerHTML = data.levels.map((level) => `
    <button class="level-btn ${level.level === activeLevel ? "on" : ""}" onclick="setLevel('${level.level}')">${level.level}</button>
  `).join("");
}

function renderLessons(){
  const level = currentLevelData();
  $("levelFocus").textContent = level.label + " · " + level.focus;
  $("lessons").innerHTML = level.tracks.map((track) => `
    <div class="group-title">${esc(track.group)}</div>
    ${track.lessons.map((lesson) => `
      <button class="lesson-card ${activeLesson && lesson.slug === activeLesson.slug ? "on" : ""}" onclick="openLessonBySlug('${lesson.slug}')">
        <div class="lesson-title">${esc(lesson.title)}</div>
        <div class="lesson-meta"><span>${esc(level.level)}</span><span>${esc(lesson.duration)}</span><span>${esc(lesson.scenario)}</span></div>
      </button>
    `).join("")}
  `).join("");
}

function setLevel(level){
  stopSpeech();
  activeLevel = level;
  activeLesson = null;
  renderLevels();
  renderLessons();
  openLesson(firstLesson(currentLevelData()));
}

function openLessonBySlug(slug){
  const lessons = currentLevelData().tracks.flatMap((track) => track.lessons);
  const lesson = lessons.find((item) => item.slug === slug);
  if(lesson) openLesson(lesson);
}

function openLesson(lesson){
  stopSpeech();
  activeLesson = lesson;
  transcriptHidden = true;
  renderLessons();
  renderPanel();
}

function renderPanel(){
  if(!activeLesson){
    $("panel").innerHTML = '<div class="empty">Chọn một bài nghe để bắt đầu.</div>';
    return;
  }
  const lesson = activeLesson;
  $("panel").innerHTML = `
    <section class="panel-head">
      <h1 class="panel-title">${esc(lesson.title)}</h1>
      <p class="panel-sub">${esc(lesson.scenario)} Mục tiêu: ${esc(lesson.goal)}</p>
      <div class="meta-row">
        <span class="tag">${esc(activeLevel)}</span>
        <span class="tag">${esc(lesson.duration)}</span>
        <span class="tag">${esc(lesson.sourceHint || "DinoDeutsch script")}</span>
      </div>
    </section>
    <section class="player">
      <div class="bar"><div id="fill" class="fill"></div></div>
      <div class="controls">
        <button class="btn primary" onclick="playLesson()">▶ Nghe toàn bài</button>
        <button class="btn" onclick="pauseSpeech()">⏸ Tạm dừng</button>
        <button class="btn" onclick="resumeSpeech()">▶ Tiếp tục</button>
        <button class="btn" onclick="stopSpeech()">■ Dừng</button>
        <button class="btn" onclick="toggleTranscript()">${transcriptHidden ? "Hiện transcript" : "Ẩn transcript"}</button>
        <label class="rate">Tốc độ <input id="rate" type="range" min="0.65" max="1.15" step="0.05" value="0.9"><span id="rateVal">0.90x</span></label>
      </div>
    </section>
    <section class="content">
      <div class="card">
        <h2>Transcript</h2>
        <div id="transcript" class="transcript ${transcriptHidden ? "hidden" : ""}">
          ${lesson.transcript.map((line, index) => `
            <div class="line"><button title="Nghe câu" onclick="speakLine(${index})">▶</button><span>${esc(line)}</span></div>
          `).join("")}
        </div>
      </div>
      <div class="card">
        <h2>Listen for</h2>
        <div class="listen-tags">${lesson.listenFor.map((item) => `<span class="listen-tag">${esc(item)}</span>`).join("")}</div>
        <h2 style="margin-top:18px">Shadowing</h2>
        <div class="checklist">
          ${lesson.shadowing.map((item, index) => `
            <label class="check"><input type="checkbox" data-key="${lesson.slug}-${index}" onchange="saveCheck(this)"> <span>${esc(item)}</span></label>
          `).join("")}
        </div>
      </div>
      <div class="card">
        <h2>Dictation</h2>
        <textarea id="dictation" placeholder="Nghe rồi gõ lại những gì bạn bắt được. Có thể làm từng câu hoặc cả đoạn."></textarea>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
          <button class="btn primary" onclick="checkDictation()">Chấm dictation</button>
          <button class="btn" onclick="fillFirstLetters()">Gợi ý chữ đầu</button>
        </div>
        <div id="score" class="score"></div>
      </div>
      <div class="card">
        <h2>Checklist hiểu bài</h2>
        <div class="checklist">
          ${lesson.checklist.map((item, index) => `
            <label class="check"><input type="checkbox" data-key="${lesson.slug}-goal-${index}" onchange="saveCheck(this)"> <span>${esc(item)}</span></label>
          `).join("")}
        </div>
      </div>
    </section>
  `;
  restoreChecks();
  const rate = $("rate");
  rate.addEventListener("input", () => $("rateVal").textContent = Number(rate.value).toFixed(2) + "x");
}

function lessonText(){
  return activeLesson.transcript.join(" ");
}

function playLesson(){
  speak(lessonText(), true);
}

function speakLine(index){
  speak(activeLesson.transcript[index], false);
}

function speak(text, trackProgress){
  stopSpeech();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "de-DE";
  utterance.rate = Number($("rate") ? $("rate").value : 0.9);
  utterance.pitch = 1;
  utterance.onend = stopProgress;
  utterance.onerror = stopProgress;
  speechSynthesis.speak(utterance);
  if(trackProgress) startProgress(text);
}

function startProgress(text){
  stopProgress();
  progress = 0;
  const estimate = Math.max(16, text.split(/\s+/).length / Number($("rate").value || .9) * 0.55);
  progressTimer = setInterval(() => {
    progress = Math.min(100, progress + 100 / estimate);
    const fill = $("fill");
    if(fill) fill.style.width = progress + "%";
    if(progress >= 100) stopProgress();
  }, 1000);
}

function stopProgress(){
  clearInterval(progressTimer);
  progressTimer = null;
}

function pauseSpeech(){
  if(speechSynthesis.speaking) speechSynthesis.pause();
}

function resumeSpeech(){
  if(speechSynthesis.paused) speechSynthesis.resume();
}

function stopSpeech(){
  speechSynthesis.cancel();
  stopProgress();
  const fill = $("fill");
  if(fill) fill.style.width = "0";
}

function toggleTranscript(){
  transcriptHidden = !transcriptHidden;
  renderPanel();
}

function checkDictation(){
  const target = normalize(lessonText()).split(" ").filter(Boolean);
  const typed = new Set(normalize($("dictation").value).split(" ").filter(Boolean));
  const hit = target.filter((word) => typed.has(word));
  const pct = Math.round(hit.length / Math.max(target.length, 1) * 100);
  const missing = [...new Set(target.filter((word) => !typed.has(word)))].slice(0, 12);
  $("score").innerHTML = `<strong>${pct}% khớp từ khóa.</strong><br>${pct >= 75 ? "Ổn. Bước tiếp theo: shadowing không nhìn transcript." : "Nghe lại từng câu, ưu tiên từ khóa trước."}<br><span style="color:var(--tx3)">Từ còn thiếu: ${missing.map(esc).join(", ") || "không đáng kể"}</span>`;
}

function fillFirstLetters(){
  $("dictation").value = activeLesson.transcript.map((line) => line.split(/\s+/).map((word) => word[0] ? word[0] + "..." : "").join(" ")).join("\n");
}

function saveCheck(input){
  localStorage.setItem("listening-check-" + input.dataset.key, input.checked ? "1" : "0");
}

function restoreChecks(){
  document.querySelectorAll("input[type='checkbox'][data-key]").forEach((input) => {
    input.checked = localStorage.getItem("listening-check-" + input.dataset.key) === "1";
  });
}

window.addEventListener("message", (event) => {
  if(event.data && event.data.type === "SET_THEME"){
    document.documentElement.setAttribute("data-theme", event.data.theme === "dark" ? "dark" : "light");
  }
});
window.addEventListener("beforeunload", stopSpeech);
</script>
</body>
</html>
